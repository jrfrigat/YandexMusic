name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET (8 / 9 / 10)
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test (net8.0, net9.0, net10.0)
        run: dotnet test --configuration Release --no-build --verbosity normal

      - name: Pack (validation)
        run: |
          dotnet pack src/YandexMusic.API/YandexMusic.API.csproj --configuration Release --no-build -o ./artifacts
          dotnet pack src/YandexMusic/YandexMusic.csproj --configuration Release --no-build -o ./artifacts

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: ./artifacts/*.*nupkg
          if-no-files-found: ignore
