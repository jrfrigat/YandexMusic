name: Release (NuGet)

# Publishes the YandexMusic and YandexMusic.DependencyInjection packages to NuGet.org.
# Trigger by pushing a version tag, e.g.:  git tag v0.1.0 && git push origin v0.1.0
# The tag (without the "v" prefix) IS the package version, and the GitHub Release is created here.
#
# One-time setup (Trusted Publishing — no long-lived API key is stored):
#   nuget.org -> Account -> Trusted Publishing -> add a policy for EACH package id
#   (YandexMusic, YandexMusic.DependencyInjection):
#     Repository:    jrfrigat/YandexMusic
#     Workflow file: release.yml
#   Then set the repository variable NUGET_USER = your nuget.org username
#   (Settings -> Secrets and variables -> Actions -> Variables).
on:
  push:
    tags: [ 'v*' ]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write   # create the GitHub Release
  id-token: write   # OIDC token for NuGet Trusted Publishing

jobs:
  publish:
    name: Pack & push to NuGet
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup .NET (8 / 9 / 10)
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Resolve version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing version $VERSION"

      - name: Restore
        run: dotnet restore YandexMusic.slnx

      - name: Build (Release)
        run: dotnet build YandexMusic.slnx -c Release --no-restore -p:Version=${{ steps.version.outputs.value }}

      - name: Test
        run: dotnet test YandexMusic.slnx -c Release --no-build

      # Only IsPackable=true projects produce packages: YandexMusic and YandexMusic.DependencyInjection
      # (the DI package declares a NuGet dependency on YandexMusic, so both ship together). Symbol
      # packages (.snupkg) are produced alongside via IncludeSymbols. tests are IsPackable=false.
      - name: Pack
        run: dotnet pack YandexMusic.slnx -c Release --no-build -p:Version=${{ steps.version.outputs.value }} -o artifacts

      # Trusted Publishing: exchange the GitHub OIDC token for a short-lived NuGet API key.
      - name: NuGet login (Trusted Publishing)
        id: nuget-login
        uses: NuGet/login@v1
        with:
          user: ${{ vars.NUGET_USER }}

      - name: Push to NuGet.org
        run: >
          dotnet nuget push "artifacts/*.nupkg"
          --api-key ${{ steps.nuget-login.outputs.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" artifacts/*.nupkg --generate-notes --title "${{ github.ref_name }}"

  # Publishes the sample terminal player as a versioned, self-contained Windows CLI and attaches the
  # zip to the GitHub Release. Runs on Windows so the player's net*-windows TFM (real NAudio playback)
  # resolves; the build is not trimmed because the sample uses reflection-based JSON.
  player:
    name: Publish player (CLI)
    needs: publish
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Resolve version from tag
        id: version
        shell: bash
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Publish (win-x64, self-contained, single file)
        run: >
          dotnet publish samples/YandexMusic.Player/YandexMusic.Player.csproj
          -c Release -r win-x64 --self-contained true
          -p:PublishSingleFile=true -p:Version=${{ steps.version.outputs.value }}
          -o publish/player

      - name: Zip
        shell: pwsh
        run: Compress-Archive -Path publish/player/* -DestinationPath "yandexmusic-player-${{ steps.version.outputs.value }}-win-x64.zip"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: yandexmusic-player-${{ steps.version.outputs.value }}-win-x64
          path: yandexmusic-player-${{ steps.version.outputs.value }}-win-x64.zip

      - name: Attach to the GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.ref_name }}" "yandexmusic-player-${{ steps.version.outputs.value }}-win-x64.zip" --clobber
