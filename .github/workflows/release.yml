name: Release (NuGet)

# Publishes the YandexMusic and YandexMusic.DependencyInjection packages to NuGet.org.
# Trigger by pushing a version tag, e.g.:  git tag v0.1.0 && git push origin v0.1.0
# The tag (without the "v" prefix) IS the package version, and the GitHub Release is created here.
#
# One-time setup (Trusted Publishing — no long-lived API key is stored):
#   nuget.org -> Account -> Trusted Publishing -> add a policy for EACH package id
#   (YandexMusic, YandexMusic.DependencyInjection):
#     Repository:    jrfrigat/YandexMusic
#     Workflow file: release.yml
#   Then set the repository variable NUGET_USER = your nuget.org username
#   (Settings -> Secrets and variables -> Actions -> Variables).
on:
  push:
    tags: [ 'v*' ]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write   # create the GitHub Release
  id-token: write   # OIDC token for NuGet Trusted Publishing

jobs:
  publish:
    name: Pack & push to NuGet
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup .NET (8 / 9 / 10)
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Restore
        run: dotnet restore YandexMusic.slnx

      # MinVer derives the package version from the pushed tag (v0.1.0 -> 0.1.0); fetch-depth: 0 above
      # gives it the tag + history. No manual version flag is needed.
      - name: Build (Release)
        run: dotnet build YandexMusic.slnx -c Release --no-restore

      - name: Test
        run: dotnet test YandexMusic.slnx -c Release --no-build

      # Only IsPackable=true projects produce packages: YandexMusic and YandexMusic.DependencyInjection
      # (the DI package declares a NuGet dependency on YandexMusic, so both ship together). Symbol
      # packages (.snupkg) are produced alongside via IncludeSymbols. tests are IsPackable=false.
      - name: Pack
        run: dotnet pack YandexMusic.slnx -c Release --no-build -o artifacts

      # Trusted Publishing: exchange the GitHub OIDC token for a short-lived NuGet API key.
      - name: NuGet login (Trusted Publishing)
        id: nuget-login
        uses: NuGet/login@v1
        with:
          user: ${{ vars.NUGET_USER }}

      - name: Push to NuGet.org
        run: >
          dotnet nuget push "artifacts/*.nupkg"
          --api-key ${{ steps.nuget-login.outputs.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" artifacts/*.nupkg --generate-notes --title "${{ github.ref_name }}"
