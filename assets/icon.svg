<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="YandexMusic">
  <title>YandexMusic</title>
  <desc>A music note inside angle brackets — a Yandex Music API library</desc>

  <!-- Badge (Yandex yellow) -->
  <rect x="8" y="8" width="112" height="112" rx="30" fill="#FFCC00"/>

  <!-- Angle brackets: this is a library/SDK, not a player -->
  <g fill="none" stroke="#E10600" stroke-width="7" stroke-linecap="round" stroke-linejoin="miter">
    <path d="M44 48 L28 64 L44 80"/>
    <path d="M84 48 L100 64 L84 80"/>
  </g>

  <!-- Eighth note (single cohesive glyph: stem bottom tucked inside the head) -->
  <g fill="#E10600">
    <rect x="63" y="47.5" width="5" height="26.5" rx="2.5"/>
    <path d="M64.5 47.5 C78 48.5 79 62 72.5 67.5 C78 58 70 55 64.5 57.5 Z"/>
    <ellipse cx="59" cy="74" rx="9.3" ry="6" transform="rotate(-18 59 74)"/>
  </g>
</svg>
